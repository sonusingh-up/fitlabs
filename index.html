<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FitLab — Evidence-based supplement reviews</title>
  <link rel="stylesheet" href="project/styles/tokens.css"/>
  <style>
    html, body { margin: 0; padding: 0; background: #1a1a1a; }
    body { font-family: "Geist", system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="project/design-canvas.jsx"></script>
  <script type="text/babel" src="project/components/shared.jsx"></script>
  <script type="text/babel" src="project/pages/homepage.jsx"></script>
  <script type="text/babel" src="project/pages/reviews.jsx"></script>
  <script type="text/babel" src="project/pages/library.jsx"></script>
  <script type="text/babel" src="project/pages/india-goals.jsx"></script>
  <script type="text/babel" src="project/pages/research-blog.jsx"></script>
  <script type="text/babel" src="project/pages/about-legal.jsx"></script>
  <script type="text/babel" src="project/pages/brands.jsx"></script>

  <script type="text/babel" data-presets="react">
    const ART_W = 1440;
    const ART_H = 2200;

    const Frame = ({ children, h = ART_H }) => (
      <div style={{ width: ART_W, minHeight: h, background: "#FBFAF7", overflow: "hidden" }}>
        {children}
      </div>
    );

    const App = () => (
      <DesignCanvas
        title="FitLab — Evidence-based supplement reviews, redesigned"
        subtitle="Modern wellness with a research backbone · 22 screens · April 2026"
      >
        <DCSection id="home" title="01 · Brand & homepage">
          <DCArtboard id="home" label="Homepage" width={ART_W} height={2600}>
            <Frame h={2600}><Homepage/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="reviews" title="02 · Reviews">
          <DCArtboard id="reviews-index" label="Reviews index — filterable list" width={ART_W} height={2200}>
            <Frame h={2200}><ReviewsIndex/></Frame>
          </DCArtboard>
          <DCArtboard id="review-detail" label="Review detail — Transparent Labs Whey" width={ART_W} height={2600}>
            <Frame h={2600}><ReviewDetail/></Frame>
          </DCArtboard>
          <DCArtboard id="best-of" label="Best-of detail — Best Whey Protein 2026" width={ART_W} height={2600}>
            <Frame h={2600}><BestOfDetail/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="library" title="03 · Library — ingredients, stacks, compare">
          <DCArtboard id="ingredients" label="Ingredients library" width={ART_W} height={1800}>
            <Frame h={1800}><IngredientsLibrary/></Frame>
          </DCArtboard>
          <DCArtboard id="ingredient-detail" label="Ingredient detail — Creatine" width={ART_W} height={2200}>
            <Frame h={2200}><IngredientDetail/></Frame>
          </DCArtboard>
          <DCArtboard id="stacks-index" label="Stacks index" width={ART_W} height={2000}>
            <Frame h={2000}><StacksIndex/></Frame>
          </DCArtboard>
          <DCArtboard id="stack-detail" label="Stack detail — The Hypertrophy Stack" width={ART_W} height={2200}>
            <Frame h={2200}><StackDetail/></Frame>
          </DCArtboard>
          <DCArtboard id="compare" label="Compare detail — Transparent Labs vs Optimum" width={ART_W} height={2000}>
            <Frame h={2000}><CompareDetail/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="goals" title="04 · By Goal & India">
          <DCArtboard id="by-goal" label="By Goal index" width={ART_W} height={1800}>
            <Frame h={1800}><ByGoalIndex/></Frame>
          </DCArtboard>
          <DCArtboard id="india" label="India hub" width={ART_W} height={2400}>
            <Frame h={2400}><IndiaHub/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="research" title="05 · Research, Methodology & Blog">
          <DCArtboard id="research-index" label="Research index" width={ART_W} height={1800}>
            <Frame h={1800}><ResearchIndex/></Frame>
          </DCArtboard>
          <DCArtboard id="methodology" label="Methodology v3.1" width={ART_W} height={2400}>
            <Frame h={2400}><Methodology/></Frame>
          </DCArtboard>
          <DCArtboard id="blog-index" label="Blog index" width={ART_W} height={1800}>
            <Frame h={1800}><BlogIndex/></Frame>
          </DCArtboard>
          <DCArtboard id="blog-detail" label="Blog detail — Protein needs" width={ART_W} height={2400}>
            <Frame h={2400}><BlogDetail/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="company" title="06 · About, Authors & Legal">
          <DCArtboard id="about" label="About FitLab" width={ART_W} height={1800}>
            <Frame h={1800}><About/></Frame>
          </DCArtboard>
          <DCArtboard id="authors" label="Authors — incl. Pankaj Singh, Pharm.B" width={ART_W} height={2000}>
            <Frame h={2000}><Authors/></Frame>
          </DCArtboard>
          <DCArtboard id="privacy" label="Privacy policy" width={ART_W} height={2000}>
            <Frame h={2000}><Privacy/></Frame>
          </DCArtboard>
          <DCArtboard id="terms" label="Terms of service" width={ART_W} height={2000}>
            <Frame h={2000}><Terms/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="brands" title="07 · Brands">
          <DCArtboard id="brands-index" label="Brands index — 26 brands with filters" width={ART_W} height={2400}>
            <Frame h={2400}><BrandsIndex/></Frame>
          </DCArtboard>
          <DCArtboard id="brand-detail" label="Brand detail — Transparent Labs" width={ART_W} height={2200}>
            <Frame h={2200}><BrandDetail slug="transparent-labs"/></Frame>
          </DCArtboard>
          <DCArtboard id="brand-detail-thorne" label="Brand detail — Thorne" width={ART_W} height={2200}>
            <Frame h={2200}><BrandDetail slug="thorne"/></Frame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
