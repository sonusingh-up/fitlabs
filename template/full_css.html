<style>
/* ══════════════════════════════════════════════════════════
   THORNE CREATINE REVIEW — Enhanced with all new components
   ══════════════════════════════════════════════════════════ */
html,body{overflow-x:hidden !important;max-width:100% !important;width:100%}
*,*::before,*::after{box-sizing:border-box}
img,video,iframe,canvas,svg{max-width:100%}
.review-page{padding:0 0 80px}

/* HERO — Deep blue-green clinical feel matching Thorne's brand */
.review-hero{
  background:linear-gradient(135deg,#0B1E2D 0%,#0F2A3D 55%,#163B52 100%);
  padding:52px 0 44px;color:#fff;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.review-hero__inner{display:grid;grid-template-columns:1fr 320px;gap:48px;align-items:center}
.review-hero__badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,168,120,.18);border:1px solid rgba(0,168,120,.32);border-radius:50px;padding:5px 14px;font-size:.72rem;font-weight:700;color:#86EFAC;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.review-hero__title{font-family:var(--font-head);font-size:clamp(1.9rem,3.5vw,2.8rem);font-weight:700;line-height:1.12;letter-spacing:-.022em;color:#fff;margin-bottom:16px}
.review-hero__meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:.82rem;color:rgba(255,255,255,.5);margin-bottom:22px}
.review-hero__meta span{display:flex;align-items:center;gap:5px}
.score-pill{display:inline-flex;align-items:center;gap:8px;background:var(--accent);border-radius:50px;padding:8px 20px;font-family:var(--font-head);font-size:1.1rem;font-weight:700;color:#fff;box-shadow:0 4px 18px rgba(0,168,120,.35)}
.score-pill .sp-label{font-size:.72rem;font-weight:500;opacity:.85}
.review-hero__img-box{position:relative;background:rgba(255,255,255,.05);border-radius:20px;border:1px solid rgba(255,255,255,.1);padding:24px;display:flex;align-items:center;justify-content:center;min-height:280px}
.review-hero__img-box img{width:100%;max-width:240px;object-fit:contain;display:block;margin:0 auto;filter:drop-shadow(0 12px 28px rgba(0,0,0,.4))}
.hero-verdict-badge{position:absolute;top:-14px;right:-10px;background:var(--accent);color:#fff;font-size:.72rem;font-weight:700;padding:5px 14px;border-radius:50px;letter-spacing:.04em;box-shadow:0 4px 12px rgba(0,168,120,.4)}

/* ── STAT STRIP ─────────────────────────────────────────── */
.stat-strip{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin:28px 0}
.stat-item{padding:16px 10px;text-align:center;background:#fff;border-right:1px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-val{font-family:var(--font-head);font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:700;color:var(--accent);line-height:1;margin-bottom:4px}
.stat-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}

/* ── QUICK FACTS ─────────────────────────────────────────── */
.quick-facts{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;margin:0 0 24px}
.quick-facts__title{font-family:var(--font-head);font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.qf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qf-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;background:var(--bg);font-size:.84rem}
.qf-row .qf-label{color:var(--muted);font-weight:500}
.qf-row .qf-val{font-weight:700;color:var(--dark)}
.qf-row .qf-val.good{color:var(--accent)}
.qf-row .qf-val.warn{color:#D97706}

/* ── QUICK VERDICT ───────────────────────────────────────── */
.quick-verdict{background:var(--white);border:2px solid var(--accent);border-radius:16px;padding:28px;margin:24px 0}
.quick-verdict__title{font-family:var(--font-head);font-size:1.2rem;font-weight:700;color:var(--dark);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.verdict-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.verdict-pro,.verdict-con{padding:12px 14px;border-radius:10px;font-size:.86rem;line-height:1.55}
.verdict-pro{background:#F0FDF4;border:1px solid #BBF7D0;color:#14532D}
.verdict-pro::before{content:"✔ ";font-weight:700;color:#16A34A}
.verdict-con{background:#FFF7ED;border:1px solid #FED7AA;color:#7C2D12}
.verdict-con::before{content:"✗ ";font-weight:700;color:#EA580C}

/* ── VERDICT BADGE (Recommended) ────────────────────────── */
.verdict-badge-wrap{text-align:center;padding:28px 24px;background:linear-gradient(135deg,var(--accent-soft),#fff);border:2px solid var(--accent);border-radius:16px;margin:24px 0}
.verdict-badge-icon{font-size:2.5rem;margin-bottom:8px}
.verdict-badge-title{font-family:var(--font-head);font-size:1.3rem;font-weight:700;color:var(--dark);margin-bottom:6px}
.verdict-badge-sub{font-size:.9rem;color:var(--muted);max-width:500px;margin:0 auto 16px}
.verdict-badge-stamp{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;padding:10px 24px;border-radius:50px;font-weight:700;font-size:.9rem}

/* ── SCORE BREAKDOWN MAIN ────────────────────────────────── */
.score-breakdown-main{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;margin:24px 0}
.score-breakdown-main__title{font-family:var(--font-head);font-size:1.1rem;font-weight:700;color:var(--dark);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.sb-main-grid{display:flex;flex-direction:column;gap:14px}
.sbm-row{display:grid;grid-template-columns:160px 1fr 40px;gap:12px;align-items:center}
.sbm-label{font-size:.88rem;font-weight:600;color:var(--dark)}
.sbm-bar-wrap{background:var(--bg);border-radius:50px;height:10px;overflow:hidden}
.sbm-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--accent),#22D3A8);transition:width 1s ease}
.sbm-score{font-family:var(--font-head);font-size:1.1rem;font-weight:700;color:var(--dark);text-align:right}
.sbm-score span{font-size:.75rem;color:var(--muted);font-family:var(--font-body);font-weight:400}/10

/* ── PRICING TABLE ────────────────────────────────────────── */
.pricing-section{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;margin:24px 0}
.pricing-section__title{font-family:var(--font-head);font-size:1.1rem;font-weight:700;color:var(--dark);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.price-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.price-card{border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;position:relative;transition:box-shadow .2s}
.price-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.08)}
.price-card.best{border-color:var(--accent);border-width:2px;background:var(--accent-soft)}
.price-card__badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:.68rem;font-weight:700;padding:3px 12px;border-radius:50px;white-space:nowrap}
.price-card__size{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.price-card__price{font-family:var(--font-head);font-size:1.8rem;font-weight:700;color:var(--dark);line-height:1;margin-bottom:4px}
.price-card__per{font-size:.8rem;color:var(--muted);margin-bottom:12px}
.price-card__features{list-style:none;text-align:left;font-size:.82rem;color:var(--text);display:flex;flex-direction:column;gap:5px}
.price-card__features li::before{content:"• ";color:var(--accent);font-weight:700}
.price-card__cta{display:block;background:var(--accent);color:#fff;font-weight:700;font-size:.84rem;padding:10px;border-radius:50px;text-decoration:none;margin-top:14px;transition:all .2s}
.price-card.best .price-card__cta{background:var(--accent-dark)}
.price-card__cta:hover{opacity:.9;transform:translateY(-1px)}

/* ── LAYOUT ───────────────────────────────────────────────── */
.review-layout{display:grid;grid-template-columns:1fr 290px;gap:48px;align-items:start;padding-top:40px}
.review-main h2{font-family:var(--font-head);font-size:1.55rem;font-weight:700;color:var(--dark);margin:44px 0 16px;padding-top:8px;border-top:2px solid var(--accent-soft);letter-spacing:-.015em}
.review-main h2:first-child{margin-top:0;border-top:none}
.review-main h3{font-family:var(--font-head);font-size:1.15rem;font-weight:600;color:var(--dark);margin:28px 0 10px}
.review-main p{font-size:.95rem;line-height:1.82;color:var(--text);margin-bottom:16px}
.review-main ul{margin:.6rem 0 1rem 1.2rem;list-style:disc}
.review-main ul li{font-size:.95rem;line-height:1.75;color:var(--text);margin-bottom:.4rem}
.review-main a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}

/* ── SIDEBAR ──────────────────────────────────────────────── */
.review-sidebar{position:sticky;top:76px}
.sidebar-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:20px}
.sidebar-box__title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--accent);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.toc-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.toc-list a{font-size:.85rem;color:var(--muted);text-decoration:none;padding:5px 8px;border-radius:6px;display:block;transition:all .15s}
.toc-list a:hover,.toc-list a.active{background:var(--accent-soft);color:var(--accent)}
.toc-list a.active{font-weight:600}
.score-breakdown{display:flex;flex-direction:column;gap:10px}
.sb-row{display:flex;align-items:center;gap:10px}
.sb-label{font-size:.8rem;color:var(--muted);width:110px;flex-shrink:0}
.sb-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.sb-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .8s ease}
.sb-num{font-size:.82rem;font-weight:700;color:var(--dark);width:28px;text-align:right}
.buy-box{background:var(--accent);border-radius:14px;padding:22px;color:#fff;text-align:center}
.buy-box__name{font-family:var(--font-head);font-size:1rem;font-weight:700;margin-bottom:4px}
.buy-box__price{font-size:1.4rem;font-weight:700;margin:8px 0}
.buy-box__note{font-size:.75rem;opacity:.75;margin-bottom:14px}
.buy-btn{display:block;background:#fff;color:var(--accent);font-weight:700;font-size:.88rem;padding:12px;border-radius:50px;text-decoration:none;transition:all .2s;box-shadow:0 4px 14px rgba(0,0,0,.15)}
.buy-btn:hover{background:#F0FDF4;transform:translateY(-1px)}
.buy-box__legal{font-size:.7rem;opacity:.55;margin-top:10px;line-height:1.5}

/* ── DATA TABLES ──────────────────────────────────────────── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:20px 0;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.88rem}
thead{background:var(--dark);color:#fff}
thead th{padding:12px 16px;text-align:left;font-weight:600;font-size:.8rem;letter-spacing:.04em;text-transform:uppercase}
tbody tr:nth-child(even){background:var(--bg)}
tbody tr:hover{background:var(--accent-soft)}
td,th{padding:11px 16px;border-bottom:1px solid var(--border)}
td:first-child{font-weight:600;color:var(--dark)}
.td-green{color:#16A34A;font-weight:700}
.td-yellow{color:#D97706;font-weight:700}
.td-red{color:#DC2626;font-weight:700}
.td-highlight{background:rgba(0,168,120,.08)!important}
.prod-img-cell{text-align:center;width:70px}
.prod-img-cell .comp-img{width:52px;height:52px;object-fit:contain;border-radius:6px;background:var(--bg);padding:4px}
.comp-emoji{font-size:2.2rem;display:block;margin:0 auto}
.check{color:var(--accent);font-weight:700}
.cross{color:#DC2626}
.best-col{background:rgba(0,168,120,.04)!important}
.prod-name-cell strong{display:block;font-size:.88rem;color:var(--dark)}
.prod-name-cell span{font-size:.76rem;color:var(--muted)}

/* ── CALLOUTS ─────────────────────────────────────────────── */
.callout{padding:20px 22px;border-radius:12px;margin:24px 0;font-size:.9rem;line-height:1.72}
.callout--science{background:#EFF6FF;border-left:4px solid #3B82F6;color:#1E3A5F}
.callout--warning{background:#FFFBEB;border-left:4px solid #F59E0B;color:#78350F}
.callout--tip{background:#F0FDF4;border-left:4px solid var(--accent);color:#14532D}
.callout--important{background:#FEF2F2;border-left:4px solid #EF4444;color:#7F1D1D}
.callout-icon{font-size:1.1rem;margin-right:8px}
.callout strong{font-weight:700}
.callout a{color:inherit;font-weight:600}

/* ── CHARTS ───────────────────────────────────────────────── */
.chart-wrap{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px;margin:24px 0}
.chart-wrap__title{font-family:var(--font-head);font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:6px}
.chart-wrap__sub{font-size:.8rem;color:var(--muted);margin-bottom:18px}
.chart-canvas-box{position:relative;height:280px}

/* ── DOSING SCHEDULE VISUAL ───────────────────────────────── */
.dosing-visual{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px;margin:24px 0}
.dosing-visual__title{font-family:var(--font-head);font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:6px}
.dosing-visual__sub{font-size:.8rem;color:var(--muted);margin-bottom:18px}
.dosing-tabs{display:flex;gap:8px;margin-bottom:20px}
.dosing-tab{padding:7px 18px;border-radius:50px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);transition:all .2s}
.dosing-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.dosing-content{display:none}
.dosing-content.active{display:block}
.dosing-schedule{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.dose-pill{border-radius:10px;padding:14px 12px;text-align:center;border:1px solid var(--border)}
.dose-pill__time{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px}
.dose-pill__amount{font-family:var(--font-head);font-size:1.2rem;font-weight:700;color:var(--dark);margin-bottom:4px}
.dose-pill__note{font-size:.7rem;color:var(--muted);line-height:1.4}
.dose-pill.highlight{background:var(--accent-soft);border-color:var(--accent)}
.dose-pill.highlight .dose-pill__amount{color:var(--accent)}

/* ── FAQ SECTION ──────────────────────────────────────────── */
.faq-section{margin:24px 0}
.faq-item{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.faq-question{width:100%;text-align:left;padding:18px 20px;font-size:.95rem;font-weight:700;color:var(--dark);cursor:pointer;background:none;border:none;display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:var(--font-body)}
.faq-question:hover{background:var(--bg)}
.faq-icon{font-size:1.2rem;color:var(--accent);flex-shrink:0;transition:transform .25s;font-weight:400;line-height:1}
.faq-question[aria-expanded="true"] .faq-icon{transform:rotate(45deg)}
.faq-answer{max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:.9rem;line-height:1.75;color:var(--text)}
.faq-answer.open{max-height:300px}
.faq-answer-inner{padding:0 20px 18px}
.faq-answer a{color:var(--accent);font-weight:600}

/* ── RELATED ──────────────────────────────────────────────── */
.related-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:16px}
.related-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;transition:all .2s;display:block}
.related-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.08);transform:translateY(-2px)}
.related-card__img{height:90px;background:var(--bg);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);font-size:2.5rem}
.related-card__img img{height:70px;object-fit:contain}
.related-card__body{padding:12px}
.related-card__cat{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:4px}
.related-card__name{font-size:.86rem;font-weight:700;color:var(--dark);line-height:1.3;margin-bottom:4px}
.related-card__score{font-size:.78rem;color:var(--muted)}

.section-anchor{scroll-margin-top:80px}

/* ── METHODOLOGY ──────────────────────────────────────────── */
.method-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin:24px 0}
.method-box h4{font-family:var(--font-head);font-size:.95rem;font-weight:700;color:var(--dark);margin-bottom:12px}
.method-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.method-item{text-align:center;padding:12px 8px;background:var(--white);border-radius:8px;border:1px solid var(--border)}
.method-item__icon{font-size:1.4rem;margin-bottom:6px}
.method-item__label{font-size:.72rem;font-weight:700;color:var(--dark);line-height:1.3}
.method-item__pct{font-size:.68rem;color:var(--muted);margin-top:2px}

/* ── BREADCRUMB ───────────────────────────────────────────── */
.breadcrumb-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 0}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted)}
.breadcrumb a{color:var(--accent);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb__sep{color:var(--border)}

/* ── MOBILE RESPONSIVE ────────────────────────────────────── */
@media(max-width:1024px){
  html,body{overflow-x:hidden !important;max-width:100vw !important}
  *{max-width:100%;word-break:break-word}
  img,canvas{max-width:100% !important}
  .review-hero__inner{grid-template-columns:1fr}
  .review-hero__img-box{max-width:300px;margin:0 auto}
  .review-layout{grid-template-columns:1fr}
  .review-sidebar{position:static}
  .stat-strip{grid-template-columns:repeat(3,1fr)}
  .price-cards{grid-template-columns:1fr}
  .score-breakdown-main .sbm-row{grid-template-columns:130px 1fr 36px}
}
@media(max-width:768px){
  .table-wrap{overflow-x:auto !important;-webkit-overflow-scrolling:touch;width:100% !important;display:block !important;max-width:calc(100vw - 32px) !important}
  table{min-width:500px;width:100%;font-size:.8rem;word-break:normal}
  td,th{padding:8px 10px !important}
  .verdict-grid{grid-template-columns:1fr !important}
  .method-grid{grid-template-columns:1fr 1fr !important}
  .sb-row{gap:6px}
  .sb-label{font-size:.74rem;width:80px}
  .sb-num{width:24px;font-size:.78rem}
  .qf-grid{grid-template-columns:1fr !important}
  .dosing-schedule{grid-template-columns:1fr 1fr !important}
}
@media(max-width:640px){
  .review-hero{padding:28px 0 22px}
  .review-hero__title{font-size:1.65rem !important}
  .review-layout{padding-top:16px}
  .review-hero__img-box{display:none}
  .quick-verdict{padding:18px 16px}
  .related-grid{grid-template-columns:1fr !important}
  .score-pill{padding:7px 16px}
  .chart-canvas-box{height:200px !important}
  .stat-strip{grid-template-columns:1fr 1fr}
  .sbm-row{grid-template-columns:1fr;gap:4px}
  .sbm-bar-wrap{order:2}
  .sbm-score{text-align:left;order:3}
}
@media(max-width:480px){
  .container{padding:0 14px !important}
  table{font-size:.76rem}
  td,th{padding:7px 8px !important}
  .sb-label{width:72px;font-size:.7rem}
  .callout{padding:14px 16px}
  .hero-verdict-badge{display:none}
  .review-hero__badge{font-size:.65rem}
  .breadcrumb{font-size:.74rem;flex-wrap:wrap}
}

/* ═══════════════════════════════════════════════════════════
   V4 TEMPLATE — NEW COMPONENT STYLES
   (appended to existing review CSS)
   ═══════════════════════════════════════════════════════════ */

/* ── BOTTOM LINE block (big pull quote) ───────────── */
.bottom-line{
  background: linear-gradient(135deg, rgba(0,168,120,.04), rgba(0,168,120,.01));
  border-left:4px solid var(--accent);
  border-radius: 0 var(--r-lg) var(--r-lg) 0;
  padding: 28px 32px;
  margin: 32px 0;
  position: relative;
}
.bottom-line__label{
  font-size: .72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--accent);
  margin-bottom: 12px;
}
.bottom-line p{
  font-size: 1.02rem;
  line-height: 1.75;
  color: var(--text);
  margin: 0 0 14px;
}
.bottom-line p:last-child{ margin-bottom: 0; }

/* ── AT-A-GLANCE DATA CARD (dense info panel) ──────── */
.glance-card{
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 0;
  margin: 28px 0 36px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.04);
}
.glance-card__head{
  background: var(--dark);
  color: #fff;
  padding: 14px 22px;
  font-family: var(--font-head);
  font-size: .9rem;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.glance-card__head-score{
  background: var(--accent);
  color: #fff;
  padding: 4px 12px;
  border-radius: 50px;
  font-size: .85rem;
  font-weight: 700;
}

/* Sub-scores row */
.glance-subscores{
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0;
  border-bottom: 1px solid var(--border);
}
.glance-subscore{
  padding: 16px 12px;
  text-align: center;
  border-right: 1px solid var(--border);
}
.glance-subscore:last-child{ border-right: none; }
.glance-subscore__label{
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 6px;
}
.glance-subscore__num{
  font-family: var(--font-head);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--dark);
  line-height: 1;
}
.glance-subscore__num--good{ color: var(--accent); }
.glance-subscore__num--weak{ color: #d97706; }

/* Price facts row */
.glance-price{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-bottom: 1px solid var(--border);
}
.glance-price__item{
  padding: 16px 14px;
  text-align: center;
  border-right: 1px solid var(--border);
}
.glance-price__item:last-child{ border-right: none; }
.glance-price__label{
  font-size: .7rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 4px;
}
.glance-price__val{
  font-family: var(--font-head);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--dark);
}
.glance-price__sub{
  font-size: .72rem;
  color: var(--muted);
  margin-top: 2px;
}

/* Key facts (What it is / Benefits / etc) */
.glance-keyfacts{
  padding: 20px 22px;
}
.glance-keyfacts__row{
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 16px;
  padding: 10px 0;
  border-bottom: 1px dashed var(--border);
  font-size: .88rem;
  line-height: 1.55;
}
.glance-keyfacts__row:last-child{ border-bottom: none; }
.glance-keyfacts__key{
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  font-size: .74rem;
  letter-spacing: .05em;
  padding-top: 2px;
}
.glance-keyfacts__val{ color: var(--text); }

/* Primary CTA inside glance card */
.glance-cta{
  background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
  padding: 22px 26px;
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: space-between;
}
.glance-cta__left{ flex:1; min-width:200px; }
.glance-cta__label{
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: rgba(255,255,255,.6);
  margin-bottom: 4px;
}
.glance-cta__headline{
  font-family: var(--font-head);
  font-size: 1.05rem;
  font-weight: 700;
  color: #fff;
  line-height: 1.35;
}
.glance-cta__btn{
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #FF9900;
  color: #111827;
  font-weight: 800;
  padding: 14px 26px;
  border-radius: 10px;
  text-decoration: none;
  font-size: .95rem;
  box-shadow: 0 6px 18px rgba(255,153,0,.35);
  transition: all .15s ease;
  white-space: nowrap;
  border: 2px solid #FF9900;
}
.glance-cta__btn:hover{
  transform: translateY(-2px);
  background: #FFB84D;
  border-color: #FFB84D;
  box-shadow: 0 8px 24px rgba(255,153,0,.5);
}
.glance-cta__btn svg{ flex-shrink:0; }
.glance-cta__note{
  font-size: .76rem;
  color: rgba(255,255,255,.5);
  width: 100%;
  margin-top: 4px;
  text-align: center;
}
@media(max-width:640px){
  .glance-cta{ flex-direction: column; align-items: stretch; gap: 14px; padding: 20px; }
  .glance-cta__left{ text-align: center; }
  .glance-cta__btn{ justify-content: center; width: 100%; padding: 16px 22px; }
}

/* ── SECTIONED VERDICT (Formula / Dosing / Value sections) ── */
.verdict-section{
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 22px 26px;
  margin: 20px 0;
  position: relative;
}
.verdict-section__label{
  font-size: .7rem;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.verdict-section__score{
  background: var(--accent-soft);
  color: var(--accent);
  padding: 3px 10px;
  border-radius: 50px;
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: none;
}
.verdict-section__title{
  font-family: var(--font-head);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--dark);
  margin: 0 0 12px;
}
.verdict-section p{
  font-size: .92rem;
  line-height: 1.75;
  color: var(--text);
  margin: 0 0 12px;
}
.verdict-section p:last-child{ margin-bottom: 0; }

/* ── BUY / SKIP two-column ─────────────────────────── */
.buy-skip{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 28px 0;
}
.buy-skip__col{
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 22px 24px;
}
.buy-skip__col--buy{ border-left: 4px solid var(--accent); }
.buy-skip__col--skip{ border-left: 4px solid #ef4444; }
.buy-skip__title{
  font-family: var(--font-head);
  font-size: 1.05rem;
  font-weight: 700;
  margin: 0 0 14px;
  color: var(--dark);
  display: flex;
  align-items: center;
  gap: 8px;
}
.buy-skip__col--buy .buy-skip__title::before{ content: "✓"; color: var(--accent); font-weight: 800; }
.buy-skip__col--skip .buy-skip__title::before{ content: "✗"; color: #ef4444; font-weight: 800; }
.buy-skip ul{ list-style: none; padding: 0; margin: 0; }
.buy-skip li{
  padding: 8px 0 8px 20px;
  position: relative;
  font-size: .89rem;
  line-height: 1.6;
  color: var(--text);
  border-bottom: 1px solid var(--border);
}
.buy-skip li:last-child{ border-bottom: none; }
.buy-skip li::before{
  content: "•";
  position: absolute;
  left: 4px;
  color: var(--muted);
  font-weight: 700;
}

@media (max-width: 680px){
  .buy-skip{ grid-template-columns: 1fr; }
}

/* ── INGREDIENTS TABLE (compact summary before deep dive) ── */
.ing-summary-table{
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0 24px;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
}
.ing-summary-table th{
  background: var(--dark);
  color: #fff;
  padding: 12px 16px;
  font-size: .78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  text-align: left;
}
.ing-summary-table td{
  padding: 12px 16px;
  font-size: .88rem;
  border-bottom: 1px solid var(--border);
}
.ing-summary-table tr:last-child td{ border-bottom: none; }
.ing-summary-table tr:nth-child(even) td{ background: var(--bg); }
.ing-summary-table a{ color: var(--accent); font-weight: 600; }

/* ── COMPARISON TABLE (How It Compares) ─────────────── */
.compare-table{
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: .85rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
}
.compare-table th{
  background: var(--accent);
  color: #fff;
  padding: 14px 16px;
  text-align: left;
  font-weight: 700;
  font-size: .78rem;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.compare-table td{
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.compare-table tr:last-child td{ border-bottom: none; }
.compare-table tr.compare-table__this{
  background: var(--accent-soft);
  font-weight: 600;
}
.compare-table tr.compare-table__this td:first-child{ color: var(--accent); }
.compare-table .cmp-score{
  display: inline-block;
  background: var(--dark);
  color: #fff;
  padding: 3px 9px;
  border-radius: 50px;
  font-size: .78rem;
  font-weight: 700;
}

/* ── DOSAGE BY CONDITION TABLE ─────────────────────── */
.dose-table{
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: .88rem;
}
.dose-table th{
  background: var(--bg);
  padding: 12px 14px;
  text-align: left;
  font-size: .78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--muted);
  border-bottom: 2px solid var(--border);
}
.dose-table td{
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.dose-table tr:last-child td{ border-bottom: none; }
.dose-table .evidence-pill{
  display: inline-block;
  padding: 3px 10px;
  border-radius: 50px;
  font-size: .74rem;
  font-weight: 700;
}
.evidence-pill--strong{ background: #dcfce7; color: #166534; }
.evidence-pill--moderate{ background: #fef3c7; color: #92400e; }
.evidence-pill--emerging{ background: #dbeafe; color: #1e40af; }
.evidence-pill--limited{ background: #fee2e2; color: #991b1b; }

/* ── SIDE EFFECTS & INTERACTIONS LIST ──────────────── */
.side-effects-grid{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 20px 0;
}
.side-effects-box{
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 20px 22px;
}
.side-effects-box__title{
  font-family: var(--font-head);
  font-size: 1rem;
  font-weight: 700;
  color: var(--dark);
  margin: 0 0 12px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}
.side-effects-box ul{
  list-style: none;
  padding: 0;
  margin: 0;
}
.side-effects-box li{
  padding: 6px 0 6px 20px;
  font-size: .85rem;
  color: var(--text);
  line-height: 1.6;
  position: relative;
}
.side-effects-box li::before{
  content: "→";
  position: absolute;
  left: 0;
  color: var(--accent);
  font-weight: 700;
}
@media (max-width: 680px){
  .side-effects-grid{ grid-template-columns: 1fr; }
}

/* ── REFERENCES (numbered with DOI/PubMed) ─────────── */
.refs-numbered{
  list-style: none;
  padding: 0;
  counter-reset: ref;
  font-size: .82rem;
  line-height: 1.8;
}
.refs-numbered li{
  counter-increment: ref;
  padding: 10px 0 10px 36px;
  position: relative;
  border-bottom: 1px dashed var(--border);
  color: var(--text);
}
.refs-numbered li:last-child{ border-bottom: none; }
.refs-numbered li::before{
  content: counter(ref);
  position: absolute;
  left: 0;
  top: 10px;
  width: 26px;
  height: 26px;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: .76rem;
}
.refs-numbered em{ color: var(--dark); font-style: italic; }
.refs-numbered a{
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
  margin-left: 6px;
  padding: 2px 8px;
  background: var(--accent-soft);
  border-radius: 4px;
  font-size: .76rem;
}
.refs-numbered a:hover{ background: var(--accent); color: #fff; }

/* ── RELATED CONTENT GRID (hybrid) ─────────────────── */
.related-block{
  margin: 40px 0;
}
.related-block__title{
  font-family: var(--font-head);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--dark);
  margin: 0 0 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--accent);
  display: inline-block;
}

/* ── MOBILE ADJUSTMENTS ─────────────────────────────── */
@media (max-width: 900px){
  .glance-subscores{ grid-template-columns: repeat(3, 1fr); }
  .glance-subscore{ border-bottom: 1px solid var(--border); }
  .glance-subscore:nth-child(3){ border-right: none; }
  .glance-subscore:nth-last-child(-n+3){ border-bottom: none; }
  .glance-price{ grid-template-columns: repeat(2, 1fr); }
  .glance-price__item:nth-child(2){ border-right: none; }
  .glance-price__item:nth-child(-n+2){ border-bottom: 1px solid var(--border); }
  .glance-keyfacts__row{ grid-template-columns: 1fr; gap: 4px; }
  .glance-keyfacts__key{ font-size: .7rem; padding-top: 0; }
  .bottom-line{ padding: 22px 24px; }
  .bottom-line p{ font-size: .95rem; }
}


/* ── MOBILE: Where to Buy + TOC at top of review ─ */
.mobile-buy-box,.mobile-toc-box{display:none}
@media(max-width:900px){
  .mobile-buy-box,.mobile-toc-box{display:block;margin-bottom:20px}
  .review-sidebar .price-compare,.review-sidebar .sidebar-box--toc{display:none}
}
/* ── INGREDIENT DEEP DIVE (structured research writeup) ── */
.ing-deep-toggle{
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  background: linear-gradient(135deg, rgba(0,168,120,.08), rgba(0,168,120,.02));
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  cursor: pointer;
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 1rem;
  color: var(--dark);
  margin: 20px 0 0;
  list-style: none;
  transition: all .2s;
}
.ing-deep-toggle:hover{ background: linear-gradient(135deg, rgba(0,168,120,.12), rgba(0,168,120,.04)); }
.ing-deep-toggle::-webkit-details-marker{ display: none; }
.ing-deep-toggle__chevron{
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 1.2rem;
  transition: transform .2s;
  flex-shrink: 0;
}
details[open] .ing-deep-toggle__chevron{ transform: rotate(45deg); }
.ing-deep-wrap{
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--r-md) var(--r-md);
  padding: 0;
  margin: 0 0 24px;
  background: var(--white);
}
.ing-deep-block{
  border-bottom: 1px solid var(--border);
}
.ing-deep-block:last-child{ border-bottom: none; }
.ing-deep-block__header{
  padding: 20px 26px 14px;
  background: linear-gradient(180deg, var(--bg) 0%, var(--white) 100%);
  border-bottom: 1px solid var(--border);
}
.ing-deep-block__name{
  font-family: var(--font-head);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--dark);
  margin: 0 0 4px;
}
.ing-deep-block__chem{
  font-size: .8rem;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 10px;
}
.ing-deep-block__badges{
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.ing-deep-block__body{ padding: 20px 26px 24px; }
.ing-deep-stats{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  margin: 0 0 20px;
  overflow: hidden;
}
.ing-deep-stat{
  padding: 14px 12px;
  border-right: 1px solid var(--border);
  text-align: center;
}
.ing-deep-stat:last-child{ border-right: none; }
.ing-deep-stat__label{
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 4px;
}
.ing-deep-stat__val{
  font-family: var(--font-head);
  font-size: .95rem;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.3;
}
.ing-deep-sub{
  margin: 22px 0 10px;
  font-family: var(--font-head);
  font-size: .98rem;
  font-weight: 700;
  color: var(--dark);
  display: flex;
  align-items: center;
  gap: 8px;
}
.ing-deep-sub svg{ color: var(--accent); flex-shrink: 0; }
.ing-deep-block__body p{
  font-size: .9rem;
  line-height: 1.75;
  color: var(--text);
  margin: 0 0 14px;
}
.ing-deep-block__body p:last-child{ margin-bottom: 0; }
.ing-study-list{
  list-style: none;
  padding: 0;
  margin: 8px 0 16px;
}
.ing-study-list li{
  padding: 12px 14px 12px 42px;
  margin-bottom: 8px;
  background: var(--bg);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--r) var(--r) 0;
  font-size: .85rem;
  line-height: 1.6;
  color: var(--text);
  position: relative;
}
.ing-study-list li::before{
  content: "📖";
  position: absolute;
  left: 12px;
  top: 12px;
  font-size: .95rem;
}
.ing-study-list strong{ color: var(--dark); }
.ing-deep-link{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--accent);
  font-weight: 600;
  text-decoration: none;
  font-size: .85rem;
  padding: 8px 14px;
  background: var(--accent-soft);
  border-radius: 50px;
  margin-top: 10px;
  transition: all .15s;
}
.ing-deep-link:hover{ background: var(--accent); color: #fff; }
@media(max-width:640px){
  .ing-deep-stats{ grid-template-columns: repeat(2,1fr); }
  .ing-deep-stat{ border-bottom: 1px solid var(--border); }
  .ing-deep-stat:nth-child(2){ border-right: none; }
  .ing-deep-stat:nth-last-child(-n+2){ border-bottom: none; }
}

/* ── COMPARE TABLE — product image rendering ──────── */
.compare-product{
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  word-break: break-word;
}
.compare-product__img{
  width: 54px;
  height: 54px;
  flex-shrink: 0;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--white);
  padding: 4px;
  object-fit: contain;
}
.compare-product__info{ flex: 1; min-width: 0; }
.compare-product__name{
  font-weight: 700;
  color: var(--dark);
  font-size: .88rem;
  line-height: 1.35;
  margin-bottom: 2px;
}
.compare-product__name a{ color: var(--dark); text-decoration: none; }
.compare-product__name a:hover{ color: var(--accent); }
.compare-product__tag{
  font-size: .7rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .05em;
  font-weight: 700;
}
.compare-table td:first-child{ min-width: 240px; }

/* ── REAL-WORLD TESTING (structured testing log) ──── */
.rw-protocol{
  background: linear-gradient(135deg, var(--dark) 0%, #1f2937 100%);
  color: #fff;
  border-radius: var(--r-lg);
  padding: 26px 30px;
  margin: 20px 0 28px;
  position: relative;
  overflow: hidden;
}
.rw-protocol::before{
  content: "";
  position: absolute;
  top: 0; right: 0;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(0,168,120,.15), transparent 70%);
  pointer-events: none;
}
.rw-protocol__label{
  font-size: .7rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--accent);
  margin-bottom: 8px;
}
.rw-protocol__title{
  font-family: var(--font-head);
  font-size: 1.2rem;
  font-weight: 700;
  margin: 0 0 14px;
  color: #fff;
}
.rw-protocol__grid{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 18px;
}
.rw-protocol__item{
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r);
  padding: 14px 16px;
}
.rw-protocol__item-label{
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: rgba(255,255,255,.55);
  font-weight: 700;
  margin-bottom: 6px;
}
.rw-protocol__item-val{
  font-family: var(--font-head);
  font-size: .95rem;
  font-weight: 700;
  color: #fff;
  line-height: 1.35;
}
@media(max-width:700px){
  .rw-protocol__grid{ grid-template-columns: repeat(2,1fr); }
}

.rw-case{
