<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FitLabReviews — CMS Admin</title>
<meta name="robots" content="noindex, nofollow"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#00A878;--accent-dark:#007F5C;--accent-soft:#E6F7F2;
  --dark:#111C18;--text:#2C3831;--muted:#6B7F77;--border:#DDE6E2;
  --bg:#F6F8F7;--white:#FFFFFF;--red:#EF4444;--amber:#F59E0B;
  --sidebar-w:240px;--header-h:60px;
}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;}
a{text-decoration:none;color:inherit;}
button,input,select,textarea{font-family:inherit;font-size:14px;}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--white);color:var(--text);outline:none;transition:border .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:120px;}
button{cursor:pointer;border:none;border-radius:8px;padding:9px 18px;font-weight:600;transition:all .2s;}

/* ── LAYOUT ───────────────────────────────── */
.app{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar-w);background:var(--dark);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;overflow-y:auto;}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.header{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;}
.content{padding:28px;flex:1;}

/* ── SIDEBAR ──────────────────────────────── */
.sidebar-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-brand-logo{display:flex;align-items:center;gap:10px;}
.sidebar-brand-icon{width:32px;height:32px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0;}
.sidebar-brand-name{color:#fff;font-size:13px;font-weight:700;line-height:1.3;}
.sidebar-brand-sub{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
.sidebar-nav{padding:12px 10px;flex:1;}
.nav-section-label{color:rgba(255,255,255,.3);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:14px 8px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:rgba(255,255,255,.55);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:var(--accent);color:#fff;}
.nav-item-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.sidebar-footer{padding:14px 10px;border-top:1px solid rgba(255,255,255,.08);}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;}
.sidebar-user-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0;}
.sidebar-user-name{color:rgba(255,255,255,.7);font-size:12px;font-weight:600;}
.sidebar-user-role{color:rgba(255,255,255,.35);font-size:10px;}

/* ── HEADER ───────────────────────────────── */
.header-title{font-size:15px;font-weight:700;color:var(--dark);}
.header-actions{display:flex;align-items:center;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent);}
.btn-outline:hover{background:var(--accent);color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg);color:var(--text);}
.btn-danger{background:#FEE2E2;color:#B91C1C;border:none;}
.btn-danger:hover{background:#FECACA;}
.btn-sm{padding:5px 12px;font-size:12px;}

/* ── STAT CARDS ───────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.stat-card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;}
.stat-card-num{font-size:26px;font-weight:700;color:var(--dark);line-height:1;}
.stat-card-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.stat-card-icon{font-size:20px;margin-bottom:8px;}

/* ── TABLE ────────────────────────────────── */
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.table-header-title{font-size:14px;font-weight:700;color:var(--dark);}
.table-search{display:flex;align-items:center;gap:8px;}
.table-search input{width:220px;padding:7px 12px;font-size:13px;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg);}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.td-title{font-weight:600;color:var(--dark);max-width:220px;}
.td-title-small{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px;}
.td-actions{display:flex;align-items:center;gap:6px;}

/* ── BADGES ───────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;letter-spacing:.04em;}
.badge-green{background:#DCFCE7;color:#15803D;}
.badge-amber{background:#FEF9C3;color:#92400E;}
.badge-red{background:#FEE2E2;color:#B91C1C;}
.badge-blue{background:#DBEAFE;color:#1D4ED8;}
.badge-gray{background:var(--bg);color:var(--muted);}
.badge-teal{background:var(--accent-soft);color:var(--accent-dark);}

/* ── SCORE PILL ───────────────────────────── */
.score-pill{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-size:12px;font-weight:700;color:#fff;}
.score-high{background:var(--accent);}
.score-mid{background:var(--amber);}
.score-low{background:var(--red);}

/* ── MODAL ────────────────────────────────── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
.modal-title{font-size:15px;font-weight:700;color:var(--dark);}
.modal-close{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--muted);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px;}

/* ── FORM ─────────────────────────────────── */
.form-grid{display:grid;gap:16px;}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:12px;font-weight:700;color:var(--dark);letter-spacing:.02em;}
.form-label span{color:var(--red);margin-left:2px;}
.form-hint{font-size:11px;color:var(--muted);}
.form-section{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding-bottom:10px;border-bottom:1px solid var(--border);margin:8px 0 4px;}

/* ── EDITOR TOOLBAR ───────────────────────── */
.editor-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.editor-toolbar{display:flex;align-items:center;gap:2px;padding:6px 8px;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.editor-btn{background:transparent;border:none;padding:4px 8px;border-radius:5px;color:var(--text);cursor:pointer;font-size:13px;font-weight:600;}
.editor-btn:hover{background:var(--border);}
.editor-sep{width:1px;height:18px;background:var(--border);margin:0 3px;}
.editor-area{width:100%;padding:12px;border:none;outline:none;min-height:200px;resize:vertical;font-family:inherit;font-size:14px;color:var(--text);line-height:1.7;}

/* ── PROS CONS ────────────────────────────── */
.pro-con-list{display:flex;flex-direction:column;gap:6px;}
.pro-con-item{display:flex;align-items:center;gap:8px;}
.pro-con-item input{flex:1;}
.pro-con-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:50px;flex-shrink:0;}
.pro-tag{background:#DCFCE7;color:#15803D;}
.con-tag{background:#FEE2E2;color:#B91C1C;}

/* ── SCORE SLIDER ─────────────────────────── */
.score-display{display:flex;align-items:center;gap:14px;}
.score-big{font-size:32px;font-weight:700;color:var(--accent);line-height:1;min-width:50px;}
.score-slider{flex:1;-webkit-appearance:none;height:6px;border-radius:50px;background:var(--border);outline:none;border:none;padding:0;}
.score-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;}

/* ── TAG INPUT ────────────────────────────── */
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--white);min-height:40px;cursor:text;}
.tag-item{display:inline-flex;align-items:center;gap:5px;background:var(--accent-soft);color:var(--accent-dark);border-radius:50px;padding:3px 10px;font-size:12px;font-weight:600;}
.tag-item-remove{background:none;border:none;color:var(--accent);cursor:pointer;padding:0;font-size:14px;line-height:1;}
.tag-input-field{border:none;outline:none;font-size:13px;color:var(--text);min-width:80px;flex:1;}

/* ── IMAGE PREVIEW ────────────────────────── */
.img-preview{width:100%;height:140px;border-radius:8px;border:1px solid var(--border);object-fit:cover;display:none;}
.img-preview.show{display:block;}
.img-placeholder{width:100%;height:140px;border-radius:8px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:12px;gap:6px;}
.img-placeholder-icon{font-size:24px;}

/* ── TABS ─────────────────────────────────── */
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:24px;border:1px solid var(--border);}
.tab{flex:1;text-align:center;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .2s;}
.tab.active{background:var(--white);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08);}

/* ── EMPTY STATE ──────────────────────────── */
.empty-state{padding:60px 20px;text-align:center;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:600;color:var(--dark);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--muted);}

/* ── EXPORT ───────────────────────────────── */
.export-box{background:var(--accent-soft);border:1px solid rgba(0,168,120,.2);border-radius:12px;padding:20px;margin-top:20px;}
.export-box h3{font-size:13px;font-weight:700;color:var(--accent-dark);margin-bottom:8px;}
.export-box p{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;}

/* ── TOAST ────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:var(--accent);}
.toast.error{background:var(--red);}

/* ── CONFIRM ──────────────────────────────── */
.confirm-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;}
.confirm-backdrop.open{display:flex;}
.confirm-box{background:var(--white);border-radius:14px;padding:28px;max-width:380px;width:90%;text-align:center;}
.confirm-icon{font-size:32px;margin-bottom:12px;}
.confirm-title{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:8px;}
.confirm-msg{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.confirm-actions{display:flex;gap:10px;justify-content:center;}

/* ── RESPONSIVE ───────────────────────────── */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);}
  .main{margin-left:0;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .form-grid-2,.form-grid-3{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-logo">
      <div class="sidebar-brand-icon">FL</div>
      <div>
        <div class="sidebar-brand-name">FitLabReviews</div>
        <div class="sidebar-brand-sub">CMS Admin</div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <div class="nav-item active" onclick="showPage('dashboard')">
      <span class="nav-item-icon">📊</span> Dashboard
    </div>
    <div class="nav-item" onclick="showPage('posts')">
      <span class="nav-item-icon">📝</span> Blog Posts
    </div>
    <div class="nav-item" onclick="showPage('reviews')">
      <span class="nav-item-icon">⭐</span> Supplement Reviews
    </div>

    <div class="nav-section-label">Organize</div>
    <div class="nav-item" onclick="showPage('categories')">
      <span class="nav-item-icon">📂</span> Categories
    </div>
    <div class="nav-item" onclick="showPage('tags')">
      <span class="nav-item-icon">🏷️</span> Tags
    </div>
    <div class="nav-item" onclick="showPage('authors')">
      <span class="nav-item-icon">👤</span> Authors
    </div>

    <div class="nav-section-label">Tools</div>
    <div class="nav-item" onclick="showPage('export')">
      <span class="nav-item-icon">📤</span> Export &amp; Publish
    </div>
    <div class="nav-item" onclick="showPage('settings')">
      <span class="nav-item-icon">⚙️</span> Settings
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-user-avatar" id="sidebarAvatar">JR</div>
      <div>
        <div class="sidebar-user-name" id="sidebarName">Jake Reynolds</div>
        <div class="sidebar-user-role">Admin · CISSN</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <header class="header">
    <div class="header-title" id="pageTitle">Dashboard</div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" onclick="exportData()">💾 Backup</button>
      <button class="btn btn-primary btn-sm" id="headerAddBtn" onclick="openAddModal()">+ New Post</button>
    </div>
  </header>

  <div class="content" id="pageContent"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal-backdrop" id="mainModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Post</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-backdrop" id="confirmBackdrop">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Delete Item</div>
    <div class="confirm-msg" id="confirmMsg">Are you sure? This cannot be undone.</div>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" onclick="doConfirm()">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════
const DB = {
  get(k){ try{ return JSON.parse(localStorage.getItem('flr_'+k)) || []; } catch(e){ return []; } },
  set(k,v){ localStorage.setItem('flr_'+k, JSON.stringify(v)); },
  getOne(k){ try{ return JSON.parse(localStorage.getItem('flr_'+k)) || {}; } catch(e){ return {}; } },
  setOne(k,v){ localStorage.setItem('flr_'+k, JSON.stringify(v)); }
};

// Seed demo data if empty
function seedData(){
  if(DB.get('authors').length === 0){
    DB.set('authors',[{id:1,name:'Jake Reynolds',initials:'JR',credentials:'CISSN · NSCA-CPT',bio:'Certified sports nutritionist with 10 years experience in supplement research.',email:'jake@fitlabreview.com'}]);
  }
  if(DB.get('categories').length === 0){
    DB.set('categories',[
      {id:1,name:'Protein Powders',slug:'protein-powders',type:'review',count:0},
      {id:2,name:'Pre-Workouts',slug:'pre-workouts',type:'review',count:0},
      {id:3,name:'Fat Burners',slug:'fat-burners',type:'review',count:0},
      {id:4,name:'Fitness Gadgets',slug:'fitness-gadgets',type:'review',count:0},
      {id:5,name:'Supplement Science',slug:'supplement-science',type:'blog',count:0},
      {id:6,name:'Training Tips',slug:'training-tips',type:'blog',count:0},
      {id:7,name:'Buying Guides',slug:'buying-guides',type:'blog',count:0},
    ]);
  }
  if(DB.get('tags').length === 0){
    DB.set('tags',[
      {id:1,name:'creatine'},{id:2,name:'protein'},{id:3,name:'pre-workout'},
      {id:4,name:'fat-loss'},{id:5,name:'muscle-gain'},{id:6,name:'beginner'},
    ]);
  }
  if(DB.get('settings').name === undefined){
    DB.setOne('settings',{name:'Jake Reynolds',initials:'JR',siteName:'FitLabReviews.com',siteUrl:'https://fitlabreviews.com',disclaimer:'We may earn a commission from links on this site.'});
  }
}

seedData();
let currentPage = 'dashboard';
let editingId = null;
let confirmCallback = null;

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function showPage(page){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');
  // fallback active
  document.querySelectorAll('.nav-item').forEach(el=>{
    if(el.getAttribute('onclick')&&el.getAttribute('onclick').includes("'"+page+"'")){el.classList.add('active');}
  });

  const titles = {dashboard:'Dashboard',posts:'Blog Posts',reviews:'Supplement Reviews',categories:'Categories',tags:'Tags',authors:'Authors',export:'Export & Publish',settings:'Settings'};
  const addLabels = {posts:'+ New Post',reviews:'+ New Review',categories:'+ New Category',tags:'+ New Tag',authors:'+ New Author'};
  document.getElementById('pageTitle').textContent = titles[page]||page;
  const addBtn = document.getElementById('headerAddBtn');
  if(addLabels[page]){ addBtn.textContent=addLabels[page]; addBtn.style.display=''; }
  else { addBtn.style.display='none'; }

  const renders = {dashboard:renderDashboard,posts:renderPosts,reviews:renderReviews,categories:renderCategories,tags:renderTags,authors:renderAuthors,export:renderExport,settings:renderSettings};
  (renders[page]||renderDashboard)();
}

// ═══════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════
function renderDashboard(){
  const posts = DB.get('posts');
  const reviews = DB.get('reviews');
  const authors = DB.get('authors');
  const cats = DB.get('categories');
  const published = [...posts,...reviews].filter(p=>p.status==='published').length;
  const drafts = [...posts,...reviews].filter(p=>p.status==='draft').length;

  const recentAll = [...posts.map(p=>({...p,_type:'post'})),...reviews.map(r=>({...r,_type:'review'}))]
    .sort((a,b)=>new Date(b.updatedAt||b.date)-new Date(a.updatedAt||a.date))
    .slice(0,5);

  document.getElementById('pageContent').innerHTML = `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-card-icon">📝</div>
      <div class="stat-card-num">${posts.length}</div>
      <div class="stat-card-label">Blog Posts</div>
      <div class="stat-card-sub">${posts.filter(p=>p.status==='published').length} published</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-icon">⭐</div>
      <div class="stat-card-num">${reviews.length}</div>
      <div class="stat-card-label">Supplement Reviews</div>
      <div class="stat-card-sub">${reviews.filter(r=>r.status==='published').length} published</div>
    </div>
    <div class="stat-card">

function editPost(id){
  const post = DB.get('posts').find(p=>p.id===id);
  if(post) openPostModal(post);
}

function savePost(statusOverride){
  const title = document.getElementById('fTitle').value.trim();
  if(!title){ showToast('Title is required','error'); return; }
  const posts = DB.get('posts');
  const tagsRaw = document.getElementById('fTags').value;
  let tags = [];
  try{ tags = JSON.parse(tagsRaw); } catch(e){}

  const data = {
    title,
    category: document.getElementById('fCategory').value,
    author: document.getElementById('fAuthor').value,
    excerpt: document.getElementById('fExcerpt').value,
    featuredImage: document.getElementById('fImage').value,
    content: document.getElementById('fContent').value,
    tags,
    status: statusOverride || document.getElementById('fStatus').value,
    date: document.getElementById('fDate').value,
    link: document.getElementById('fLink').value,
    updatedAt: new Date().toISOString()
  };

  if(editingId){
    const idx = posts.findIndex(p=>p.id===editingId);
    if(idx>-1){ posts[idx]={...posts[idx],...data}; }
  } else {
    data.id = Date.now();
    posts.push(data);
  }
  DB.set('posts',posts);
  closeModal();
  const _st = statusOverride || document.getElementById('fStatus').value;
  showToast(_st==='published'?'Post published! Remember to re-download sitemap.xml ✅':'Draft saved!','success');
  renderPosts();
}

function saveReview(statusOverride){
  const title = document.getElementById('rTitle').value.trim();
  const brand = document.getElementById('rBrand').value.trim();
  if(!title){ showToast('Product name is required','error'); return; }

  const pros = [...document.querySelectorAll('#prosList input')].map(i=>i.value.trim()).filter(Boolean);
  const cons = [...document.querySelectorAll('#consList input')].map(i=>i.value.trim()).filter(Boolean);

  const data = {
    title, brand,
    category: document.getElementById('rCategory').value,
    author: document.getElementById('rAuthor').value,
    excerpt: document.getElementById('rExcerpt').value,
    score: parseFloat(document.getElementById('rScore').value).toFixed(1),
    scores:{
      ingredients: document.getElementById('rScoreIng').value,
      dosing: document.getElementById('rScoreDose').value,
      value: document.getElementById('rScoreVal').value
    },
    pros, cons,
    featuredImage: document.getElementById('rImage').value,
    content: document.getElementById('rContent').value,
    verdict: document.getElementById('rVerdict').value,
    affiliate: document.getElementById('rAffiliate').value,
    price: document.getElementById('rPrice').value,
    status: statusOverride || document.getElementById('rStatus').value,
    date: document.getElementById('rDate').value,
    updatedAt: new Date().toISOString()
  };

  const reviews = DB.get('reviews');
  if(editingId){
    const idx = reviews.findIndex(r=>r.id===editingId);
    if(idx>-1){ reviews[idx]={...reviews[idx],...data}; }
  } else {
    data.id = Date.now();
    reviews.push(data);
  }
  DB.set('reviews',reviews);
  closeModal();
  const _rst = statusOverride || document.getElementById('rStatus').value;
  showToast(_rst==='published'?'Review published! Remember to re-download sitemap.xml ✅':'Draft saved!','success');
  renderReviews();
}

function saveCategory(){

function exportPost(id){
  const p = DB.get('posts').find(p=>p.id===id);
  if(!p) return;
  const s = DB.getOne('settings');
  const slug = (p.title||'post').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const html = generateBlogHTML(p,s);
  downloadFile(slug+'.html', html);
  showToast('Post exported! Upload to your site folder.','success');
}

function exportReview(id){
  const r = DB.get('reviews').find(r=>r.id===id);
  if(!r) return;
  const s = DB.getOne('settings');
  const slug = (r.title||'review').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const html = generateReviewHTML(r,s);
  downloadFile(slug+'-review.html', html);

}

//  SHARED HELPERS
// ═══════════════════════════════════════════
function deleteItem(collection, id, label){
  confirmCallback = ()=>{
    const items = DB.get(collection).filter(i=>i.id!==id);
    DB.set(collection,items);
    showToast(`${label} deleted`,'success');
    const renders = {posts:renderPosts,reviews:renderReviews,categories:renderCategories,tags:renderTags,authors:renderAuthors};
    (renders[collection]||renderDashboard)();
  };
  document.getElementById('confirmMsg').textContent = `Delete this ${label}? This cannot be undone.`;
  document.getElementById('confirmBackdrop').classList.add('open');
}

function closeConfirm(){ document.getElementById('confirmBackdrop').classList.remove('open'); confirmCallback=null; }
function doConfirm(){ if(confirmCallback) confirmCallback(); closeConfirm(); }

function openModal(){ document.getElementById('mainModal').classList.add('open'); }
function closeModal(){ document.getElementById('mainModal').classList.remove('open'); editingId=null; }

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+(type||'');
  setTimeout(()=>t.className='toast',3000);
}

function esc(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(d){ if(!d) return '—'; try{ return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch(e){ return d; } }
function scoreClass(s){ const n=parseFloat(s||0); return n>=8?'score-high':n>=6?'score-mid':'score-low'; }

function filterTable(input,tableId){
  const q=input.value.toLowerCase();
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(row=>{
    const text=(row.getAttribute('data-search')||row.textContent).toLowerCase();
    row.style.display=text.includes(q)?'':'none';
  });
}

function previewImg(input,previewId,placeholderId){
  const val=input.value.trim();
  const img=document.getElementById(previewId);
  const ph=document.getElementById(placeholderId);
  if(val){ img.src=val; img.classList.add('show'); ph.style.display='none'; }
  else { img.classList.remove('show'); ph.style.display=''; }
}

function addProCon(listId,type){
  const list=document.getElementById(listId);
  const item=document.createElement('div');
  item.className='pro-con-item';
  item.innerHTML=`<span class="pro-con-tag ${type==='pro'?'pro-tag':'con-tag'}">${type.toUpperCase()}</span><input type="text" placeholder="${type==='pro'?'e.g. 24g protein per serving':'e.g. Contains lactose'}"/><button type="button" onclick="removePCItem(this)" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;">×</button>`;
  list.appendChild(item);
  item.querySelector('input').focus();
}

function removePCItem(btn){ btn.parentElement.remove(); }

// Tag input
function handleTagInput(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const val=e.target.value.trim().replace(/,/g,'');
    if(val) addTagDirect(val);
    e.target.value='';
  } else if(e.key==='Backspace'&&!e.target.value){
    const tags=document.querySelectorAll('#tagWrap .tag-item');
    if(tags.length) tags[tags.length-1].remove();
    updateTagsHidden();
  }
}

function addTagDirect(tag){
  const wrap=document.getElementById('tagWrap');
  if(!wrap) return;
  const existing=[...wrap.querySelectorAll('.tag-item')].map(t=>t.textContent.replace('×','').trim());
  if(existing.includes(tag)) return;
  const item=document.createElement('span');
  item.className='tag-item';
  item.innerHTML=`${esc(tag)}<button class="tag-item-remove" type="button" onclick="removeTag(this,'${esc(tag)}')">×</button>`;
  wrap.insertBefore(item,document.getElementById('tagFieldInput'));
  updateTagsHidden();
}

function removeTag(btn,tag){
  btn.parentElement.remove();
  updateTagsHidden();
}

function updateTagsHidden(){
  const wrap=document.getElementById('tagWrap');
  if(!wrap) return;
  const tags=[...wrap.querySelectorAll('.tag-item')].map(t=>t.textContent.replace('×','').trim());
  const hidden=document.getElementById('fTags');
  if(hidden) hidden.value=JSON.stringify(tags);
}

// Editor helpers
function fmt(cmd){ document.getElementById('fContent')?.focus(); document.execCommand(cmd); }
function insertMd(type){
  const ta=document.getElementById('fContent')||document.getElementById('rContent');
  if(!ta) return;
  const inserts={h2:'\n<h2>Heading</h2>\n',h3:'\n<h3>Sub-heading</h3>\n',ul:'\n<ul>\n  <li>Item 1</li>\n  <li>Item 2</li>\n</ul>\n',link:'\n<a href="https://..." target="_blank" rel="nofollow noopener">Link text</a>\n',tip:'\n<div style="background:#E6F7F2;border-left:3px solid #00A878;padding:14px 16px;border-radius:4px;margin:16px 0;"><strong>💡 Tip:</strong> Your tip here.</div>\n',warn:'\n<div style="background:#FFFBEB;border-left:3px solid #F59E0B;padding:14px 16px;border-radius:4px;margin:16px 0;"><strong>⚠️ Note:</strong> Your warning here.</div>\n'};
  const ins=inserts[type]||'';
  const pos=ta.selectionStart;
  ta.value=ta.value.substring(0,pos)+ins+ta.value.substring(ta.selectionEnd);
  ta.selectionStart=ta.selectionEnd=pos+ins.length;
  ta.focus();
}

// Export/Import

// ═══════════════════════════════════════
//  AUTO SITEMAP GENERATOR
// ═══════════════════════════════════════
function downloadSitemap(){
  const posts   = DB.get('posts').filter(p=>p.status==='published');
  const reviews = DB.get('reviews').filter(r=>r.status==='published');
  const s       = DB.getOne('settings');
  const base    = (s.siteUrl||'https://fitlabreviews.com').replace(/\/$/,'');
  const today   = new Date().toISOString().split('T')[0];

  // Static core pages
  const staticPages = [
    { loc: base+'/',               priority:'1.0', freq:'weekly'  },
    { loc: base+'/reviews.html',   priority:'0.9', freq:'weekly'  },
    { loc: base+'/blog.html',      priority:'0.9', freq:'weekly'  },
    { loc: base+'/about.html',     priority:'0.7', freq:'monthly' },
    { loc: base+'/privacy.html',   priority:'0.3', freq:'yearly'  },
    { loc: base+'/terms.html',     priority:'0.3', freq:'yearly'  },
  ];

  function urlBlock(loc, lastmod, freq, priority){
    return `  <url>\n    <loc>${loc}</loc>\n    <lastmod>${lastmod}</lastmod>\n    <changefreq>${freq}</changefreq>\n    <priority>${priority}</priority>\n  </url>`;
  }

  let xml = `<?xml version="1.0" encoding="UTF-8"?>\n`;
  xml += `<!-- Auto-generated by FitLabReviews CMS — ${new Date().toISOString()} -->\n`;
  xml += `<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n\n`;

  xml += `  <!-- Core Pages -->\n`;
  staticPages.forEach(p=>{
    xml += urlBlock(p.loc, today, p.freq, p.priority)+'\n';
  });

  if(posts.length){
    xml += `\n  <!-- Blog Posts (${posts.length}) -->\n`;
    posts.forEach(p=>{
      const slug = (p.title||'post').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
      const lastmod = (p.updatedAt||p.date||today).split('T')[0];
      xml += urlBlock(`${base}/blog/${slug}.html`, lastmod, 'monthly', '0.8')+'\n';
    });
  }

  if(reviews.length){
    xml += `\n  <!-- Supplement Reviews (${reviews.length}) -->\n`;
    reviews.forEach(r=>{
      const slug = (r.title||'review').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
      const lastmod = (r.updatedAt||r.date||today).split('T')[0];
      xml += urlBlock(`${base}/reviews/${slug}.html`, lastmod, 'monthly', '0.8')+'\n';
    });
  }

  xml += `\n</urlset>`;

  downloadFile('sitemap.xml', xml);
  showToast(`Sitemap generated — ${staticPages.length + posts.length + reviews.length} URLs`, 'success');
}

function exportData(){
  const data={posts:DB.get('posts'),reviews:DB.get('reviews'),categories:DB.get('categories'),tags:DB.get('tags'),authors:DB.get('authors'),settings:DB.getOne('settings'),exportedAt:new Date().toISOString()};
  downloadFile('fitlabreview-backup-'+today()+'.json',JSON.stringify(data,null,2));
  showToast('Backup downloaded!','success');
}

function importData(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(data.posts) DB.set('posts',data.posts);
      if(data.reviews) DB.set('reviews',data.reviews);
      if(data.categories) DB.set('categories',data.categories);
      if(data.tags) DB.set('tags',data.tags);
      if(data.authors) DB.set('authors',data.authors);
      if(data.settings) DB.setOne('settings',data.settings);
      showToast('Backup restored successfully!','success');
      renderExport();
    } catch(err){ showToast('Invalid backup file','error'); }
  };
  reader.readAsText(file);
}

function downloadFile(filename,content){
  const a=document.createElement('a');
  a.href='data:text/html;charset=utf-8,'+encodeURIComponent(content);
  if(filename.endsWith('.json')) a.href='data:application/json;charset=utf-8,'+encodeURIComponent(content);
  a.download=filename;
  a.click();
}

function updateSidebarUser(){
  const s=DB.getOne('settings');
  const a=DB.get('authors')[0];
  document.getElementById('sidebarName').textContent=a?.name||s.name||'Admin';
  document.getElementById('sidebarAvatar').textContent=a?.initials||s.initials||'FL';
}

// Close modal on backdrop click
document.getElementById('mainModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('confirmBackdrop').addEventListener('click',function(e){if(e.target===this)closeConfirm();});

// Init
updateSidebarUser();
renderDashboard();
</script>
