<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="x-apple-disable-message-reformatting"/>
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no"/>
  <title>New Contact Message</title>
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <style>
    body,table,td,a{-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%}
    table,td{mso-table-lspace:0;mso-table-rspace:0}
    img{-ms-interpolation-mode:bicubic;border:0;height:auto;line-height:100%;outline:none;text-decoration:none}
    body{margin:0;padding:0;width:100%!important;height:100%!important;background-color:#F2EBD9}
    a[x-apple-data-detectors]{color:inherit!important;text-decoration:none!important}
    @media(prefers-color-scheme:dark){
      .bg-outer{background-color:#1A1714!important}
      .bg-card{background-color:#2A2622!important}
      .bg-info{background-color:#1A1714!important}
      .bg-footer{background-color:#2A2622!important}
      .t-dark{color:#F2EBD9!important}
      .t-muted-dark{color:#B0A99F!important}
      .t-body-dark{color:#D4C9B8!important}
      .b-dark{border-color:#3D3A36!important}
    }
    @media only screen and (max-width:620px){
      .wrap{width:100%!important;padding:0 12px!important}
      .pad{padding:28px 20px!important}
      .pad-h{padding-left:20px!important;padding-right:20px!important}
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#F2EBD9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <!-- Preheader -->
  <div style="display:none;font-size:1px;color:#F2EBD9;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">
    New contact message from {{name}} — {{subject}}
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" class="bg-outer" style="background-color:#F2EBD9;">
  <tr><td align="center" style="padding:40px 16px;">
  <table role="presentation" class="wrap" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

    <!-- HEADER -->
    <tr><td class="pad-h" style="background-color:#1A1714;padding:28px 36px;border-radius:16px 16px 0 0;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td><span style="font-size:24px;font-weight:800;color:#F2EBD9;letter-spacing:-0.03em;">Fitlab</span><span style="font-size:24px;font-weight:800;color:#C4622D;letter-spacing:-0.03em;">reviews</span></td>
        <td align="right" valign="middle"><span style="font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(242,235,217,0.45);">Internal</span></td>
      </tr>
      </table>
    </td></tr>

    <!-- ACCENT BAR -->
    <tr><td style="background:#C4622D;height:3px;font-size:0;line-height:0;">&nbsp;</td></tr>

    <!-- BODY -->
    <tr><td class="bg-card pad" style="background-color:#FFFFFF;padding:40px 36px;">

      <!-- Label + Subject -->
      <p style="margin:0 0 6px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#C4622D;font-weight:700;">New Contact Message</p>
      <h1 class="t-dark" style="margin:0 0 28px;font-size:24px;font-weight:800;color:#1A1714;line-height:1.25;letter-spacing:-0.02em;">{{subject}}</h1>

      <!-- Sender Card -->
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
      <tr><td class="bg-info b-dark" style="background-color:#F8F5EE;border-radius:10px;border:1px solid #E8E2D6;padding:18px 22px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td width="48" valign="top" style="padding-right:16px;">
            <div style="width:48px;height:48px;border-radius:50%;background-color:#1A1714;text-align:center;line-height:48px;">
              <span style="font-size:18px;font-weight:700;color:#F2EBD9;">{{initial}}</span>
            </div>
          </td>
          <td valign="middle">
            <p class="t-dark" style="margin:0 0 2px;font-size:16px;font-weight:700;color:#1A1714;">{{name}}</p>
            <p style="margin:0;font-size:14px;"><a href="mailto:{{email}}" style="color:#C4622D;text-decoration:none;">{{email}}</a></p>
          </td>
        </tr>
        </table>
      </td></tr>
      </table>

      <!-- Divider -->
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
      <tr><td class="b-dark" style="border-bottom:1px solid #E8E2D6;">&nbsp;</td></tr>
      </table>

      <!-- Message Body -->
      <div class="t-body-dark" style="font-size:15px;color:#3D3A36;line-height:1.75;">
        {{message}}
      </div>

      <!-- Reply Button -->
      <table role="presentation" cellpadding="0" cellspacing="0" style="margin-top:32px;">
      <tr><td style="border-radius:10px;background-color:#1A1714;">
        <a href="mailto:{{email}}?subject=Re:%20{{subject}}" style="display:inline-block;padding:14px 32px;color:#F2EBD9;font-size:14px;font-weight:700;text-decoration:none;letter-spacing:0.03em;">Reply to {{first_name}} &rarr;</a>
      </td></tr>
      </table>

    </td></tr>

    <!-- FOOTER -->
    <tr><td class="bg-footer pad-h b-dark" style="background-color:#FAFAF7;padding:24px 36px;border-top:1px solid #E8E2D6;border-radius:0 0 16px 16px;">
      <p style="margin:0 0 4px;font-size:13px;"><a href="https://fitlabreviews.com" style="color:#C4622D;text-decoration:none;font-weight:600;">fitlabreviews.com</a></p>
      <p class="t-muted-dark" style="margin:0;font-size:12px;color:#B0A99F;line-height:1.5;">This is an internal notification from your website contact form.</p>
    </td></tr>

  </table>
  </td></tr>
  </table>

</body>
</html>
